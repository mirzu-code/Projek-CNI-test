<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Checkout</title>
  <link rel="stylesheet" href="/src/pages/Checkout.css">
  <script src="/supabase-config.js"></script>
  <script type="module" src="/js/init-supabase.js"></script>
</head>
<body>
  <div style="max-width:720px;margin:18px auto">
    <h2>Checkout</h2>
    <div id="bookingSummary">Loading...</div>
    <div id="errorText" style="color:#b00020;display:none"></div>
    <div style="margin-top:12px">
      <button id="confirmBtn" class="btn-primary">Confirm Booking</button>
    </div>
  </div>

  <script type="module">
    import { supabase } from '/js/init-supabase.js';

    const summary = document.getElementById('bookingSummary');
    const errorText = document.getElementById('errorText');
    const confirmBtn = document.getElementById('confirmBtn');

    function readBooking(){ try { return JSON.parse(localStorage.getItem('bookingData')||'null'); } catch(e){return null;} }

    const booking = readBooking();
    if (!booking) {
      summary.textContent = 'No booking data found. Redirecting to booking form...';
      setTimeout(()=>window.location.href='/BookingFlow.html',1200);
    } else {
      summary.innerHTML = `
        <p><strong>${booking.name}</strong> (${booking.phone})</p>
        <p>Date: ${booking.date} ${booking.time}</p>
        <p>Guests: ${booking.pax}</p>
        <p>Table: ${booking.tableNumber || 'Not selected'}</p>
      `;
    }

    confirmBtn.addEventListener('click', async ()=>{
      if (!booking) return;
      confirmBtn.disabled = true;
      try {
        const payload = {
          customer_name: booking.name,
          phone: booking.phone,
          booking_date: booking.date,
          booking_time: booking.time,
          pax: booking.pax,
          table_id: booking.tableId || null,
          table_name: booking.tableNumber || null,
          status: 'Confirmed'
        };
        const { data, error } = await supabase.from('bookings').insert([payload]);
        if (error) throw error;
        localStorage.removeItem('bookingData');
        window.location.href = '/MyBooking.html';
      } catch (err) {
        errorText.style.display = 'block';
        errorText.textContent = 'Gagal buat tempahan: ' + (err.message||err);
        confirmBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
