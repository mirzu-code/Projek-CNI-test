<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Booking Flow</title>
  <link rel="stylesheet" href="/src/pages/BookingFlow.css">
  <script src="/supabase-config.js"></script>
  <script type="module" src="/js/init-supabase.js"></script>
</head>
<body>
  <h1>Booking Flow</h1>
  <form id="bookingForm" style="max-width:640px;margin:12px 0">
    <label>Name<br><input name="name" required /></label><br>
    <label>Phone<br><input name="phone" required /></label><br>
    <label>Date<br><input type="date" name="date" required /></label><br>
    <label>Time<br><input type="time" name="time" required /></label><br>
    <label>Guests (pax)<br><input type="number" name="pax" value="2" min="1" required /></label><br>
    <input type="hidden" name="preselectCuisine" />
    <input type="hidden" name="preselectDish" />
    <div style="margin-top:12px">
      <button type="submit" class="btn-primary">Proceed to Select Table</button>
    </div>
  </form>

  <script>
    // Save bookingData to localStorage and navigate to select-table
    document.getElementById('bookingForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const f = e.target;
      const booking = {
        name: f.name.value.trim(),
        phone: f.phone.value.trim(),
        date: f.date.value,
        time: f.time.value,
        pax: f.pax.value,
        preselectCuisine: f.preselectCuisine.value || null,
        preselectDish: f.preselectDish.value || null
      };
      localStorage.setItem('bookingData', JSON.stringify(booking));
      window.location.href = '/select-table.html';
    });
  </script>
</body>
</html>
