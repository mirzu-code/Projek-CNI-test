<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Western Cuisine</title>
  <link rel="stylesheet" href="/src/pages/WesternCuisine.css">
  <script src="/supabase-config.js"></script>
  <script type="module" src="/js/init-supabase.js"></script>
</head>
<body>
  <main class="cuisine-menu-page western-theme" style="max-width:1100px;margin:16px auto">
    <a href="/Menu.html">← Back to Menu</a>
    <h1>Classic Bistro Excellence</h1>
    <div id="dishes" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px"></div>
  </main>

  <script>
    const dishes = [
      { value: 'angus-steak', name: 'Black Angus Ribeye Steak', price: 'RM 120.00', image: 'https://images.unsplash.com/photo-1544025162-d76694265947?auto=format&fit=crop&w=600&q=80' },
      { value: 'seared-salmon', name: 'Pan-Seared Citrus Salmon', price: 'RM 68.00', image: 'https://images.unsplash.com/photo-1467003909585-2f8a72700288?auto=format&fit=crop&w=600&q=80' },
      { value: 'truffle-pasta', name: 'Truffle Wild Mushroom Fettuccine', price: 'RM 45.00', image: 'https://images.unsplash.com/photo-1645112411341-6c4fd023714a?auto=format&fit=crop&w=600&q=80' },
      { value: 'lembayung-burger', name: 'Signature Double Wagyu Burger', price: 'RM 55.00', image: 'https://images.unsplash.com/photo-1568901346375-23c9450c58cd?auto=format&fit=crop&w=600&q=80' }
    ];

    const container = document.getElementById('dishes');
    dishes.forEach(d=>{
      const card = document.createElement('div');
      card.className = 'dish-detail-card western-card';
      card.innerHTML = `
        <div class="dish-image-wrapper"><img src="${d.image}" class="dish-serve-image"/></div>
        <div style="padding:12px"><h3>${d.name}</h3><div>${d.price}</div><button class="btn-primary preorder">Pre-order & Reserve</button></div>
      `;
      card.querySelector('.preorder').addEventListener('click', ()=>{
        const booking = JSON.parse(localStorage.getItem('bookingData')||'{}');
        booking.preselectCuisine = 'western';
        booking.preselectDish = d.value;
        localStorage.setItem('bookingData', JSON.stringify(booking));
        window.location.href = '/BookingFlow.html';
      });
      container.appendChild(card);
    });
  </script>
</body>
</html>
